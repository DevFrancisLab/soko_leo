steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/soko_leo:latest', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/soko_leo:latest']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - soko-leo
      - --image
      - gcr.io/$PROJECT_ID/soko_leo:latest
      - --region
      - us-central1
      - --platform
      - managed
      - --allow-unauthenticated
      # Uncomment and set secrets via Secret Manager or environment variables as needed
      # - --set-env-vars
      # - DJANGO_SECRET_KEY=$$DJANGO_SECRET_KEY,DEBUG=0
timeout: 1800s
