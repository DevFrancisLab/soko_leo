name: market_weather_crop_workflow

nodes:
  - id: MarketNode
    agent: MarketAgent
    inputs:
      - market_data
    outputs:
      - market_insight

  - id: WeatherNode
    agent: WeatherAgent
    inputs:
      - market_insight
      - weather_data
    outputs:
      - weather_insight

  - id: CropNode
    agent: CropAgent
    inputs:
      - weather_insight
      - crop_data
    outputs:
      - crop_insight

edges:
  - from: MarketNode
    to: WeatherNode
  - from: WeatherNode
    to: CropNode
